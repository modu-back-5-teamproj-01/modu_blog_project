<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h2>게시글 수정</h2>

        <label for="titleInput">제목</label>
        <input type="text" id="titleInput" placeholder="게시글 제목을 입력하세요">

        <label for="contentInput">내용</label>
        <textarea id="contentInput" rows="10" placeholder="게시글 내용을 입력하세요"></textarea>

        <label for="summaryInput">요약</label>
        <input type="text" id="summaryInput" placeholder="게시글 요약을 입력하세요 (선택)">

        <div class="tag-section">
            <label for="tagInput">태그 추가</label>
            <div class="tag-input-area">
                <input type="text" id="tagInput" placeholder="태그 입력">
                <button id="addTagBtn">추가</button>
            </div>
            <div id="tagContainer" class="tag-container"></div>
        </div>

        <div class="button-group">
            <button id="saveBtn">게시글 수정 완료</button>
            <button id="cancelBtn">수정 취소</button>
        </div>
    </div>

    <!-- JS -->
    <script src="/static/js/post_edit.js"></script>
</body>
</html>
