<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <h1>비밀번호 변경</h1>

    <div class="form-group">
        <label for="currentPasswordInput">기존 비밀번호</label>
        <input type="password" id="currentPasswordInput" placeholder="기존 비밀번호 입력">
    </div>

    <div class="form-group">
        <label for="newPasswordInput">새 비밀번호</label>
        <input type="password" id="newPasswordInput" placeholder="새 비밀번호 입력">
    </div>

    <div class="form-group">
        <label for="confirmPasswordInput">새 비밀번호 확인</label>
        <input type="password" id="confirmPasswordInput" placeholder="새 비밀번호 확인">
    </div>

    <button id="submitBtn">비밀번호 변경 완료</button>
    <button id="cancelBtn">취소</button>

    <script src="/static/js/password_change.js"></script>
</body>
</html>
